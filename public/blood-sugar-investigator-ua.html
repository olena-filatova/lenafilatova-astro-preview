<meta name="description" content="Безкоштовний інтерактивний інструмент, щоб дослідити, що впливає на коливання цукру в крові — їжа, рух, сон і стрес — з науково обґрунтованими порадами.">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #2F7A52;
    --green-dark:  #1E5631;
    --green-soft:  #EAF4EC;
    --green-line:  #CDE6D6;
    --green-bg:    #F1F8F3;
    --pink:        #B23A63;
    --pink-soft:   #F7ECF1;
    --ink:         #331B33;
    --body:        #4A3A48;
    --muted:       #6A5668;
    --faint:       #9A8896;
    --radius:      16px;
  }

  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--green-bg);
    min-height: 100vh;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .wrapper { max-width: 680px; margin: 0 auto; padding: 16px 16px 32px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1E5631 0%, #2D6A4F 100%);
    color: #fff;
    padding: 22px 24px;
    border-radius: var(--radius);
    margin-bottom: 14px;
    text-align: center;
  }
  .header h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.2px; }
  .header p { font-size: 13px; opacity: 0.88; font-weight: 500; }

  /* Progress */
  .progress-bar {
    height: 5px; background: var(--green-line);
    border-radius: 3px; margin-bottom: 16px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green);
    border-radius: 3px; transition: width 0.4s ease;
  }

  /* Cards */
  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 26px 22px;
    box-shadow: 0 2px 16px rgba(51,27,51,0.06);
    margin-bottom: 12px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Question */
  .step-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--green); margin-bottom: 10px;
  }
  .question { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 20px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    background: var(--green-soft);
    border: 2px solid var(--green-line);
    border-radius: 11px;
    padding: 13px 16px;
    text-align: left; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    color: var(--ink); line-height: 1.4;
    transition: all 0.18s;
  }
  .opt:hover { background: #E1F0E7; border-color: var(--green); transform: translateX(4px); }
  .opt:active { transform: translateX(2px); }

  /* Nav */
  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
  .back {
    background: none; border: none; color: var(--faint);
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 6px 8px; border-radius: 8px; transition: all 0.15s;
  }
  .back:hover { background: #F3EEF1; color: var(--muted); }
  .step-count { font-size: 12px; color: var(--faint); }

  /* Result card */
  .result-icon { font-size: 34px; margin-bottom: 10px; display: block; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .urgency-tag { float: right; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .u-low   { background: #D1FAE5; color: #065F46; }
  .u-medium{ background: #FEF3C7; color: #92400E; }
  .u-high  { background: #FED7AA; color: #C2410C; }
  .u-critical{ background: #FEE2E2; color: #991B1B; }

  .b-food        { background: #DBEAFE; color: #1E40AF; }
  .b-insulin     { background: #EDE9FE; color: #5B21B6; }
  .b-medication  { background: #FEE2E2; color: #991B1B; }
  .b-illness     { background: #FEF3C7; color: #92400E; }
  .b-lifestyle   { background: #D1FAE5; color: #065F46; }
  .b-hormones    { background: #FCE7F3; color: #9D174D; }
  .b-exercise    { background: #DBEAFE; color: #1E40AF; }
  .b-equipment   { background: #F3F4F6; color: #374151; }
  .b-environment { background: #ECFDF5; color: #065F46; }
  .b-physiology  { background: #EDE9FE; color: #5B21B6; }
  .b-emergency   { background: #FEE2E2; color: #991B1B; }
  .b-medical     { background: #FEF3C7; color: #92400E; }
  .b-unknown     { background: #F3F4F6; color: #374151; }

  .result-title { font-size: 20px; font-weight: 800; margin-bottom: 12px; clear: both; letter-spacing: -0.2px; }
  .result-title.critical-color { color: #DC2626; }
  .explanation { font-size: 14px; line-height: 1.65; color: var(--body); margin-bottom: 18px; }

  .tips-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.7px; color: var(--green); margin-bottom: 8px;
  }
  .tips { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .tips li { font-size: 13px; line-height: 1.5; color: var(--body); padding-left: 20px; position: relative; }
  .tips li::before { content: '✓'; position: absolute; left: 0; color: var(--green); font-weight: 700; }

  .consult-note {
    background: var(--green-bg); border-left: 3px solid var(--green);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 12px; color: var(--body); margin-top: 16px; line-height: 1.5;
  }

  .btn-continue {
    background: var(--green); color: #fff; border: none; border-radius: 11px;
    padding: 13px 18px; width: 100%; font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 14px; transition: background 0.2s;
  }
  .btn-continue:hover { background: var(--green-dark); }

  .btn-restart {
    background: transparent; color: var(--green); border: 2px solid var(--green-line);
    border-radius: 11px; padding: 11px 18px; width: 100%;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    margin-top: 8px; transition: all 0.2s;
  }
  .btn-restart:hover { background: var(--green-soft); }

  .card.critical-border { border: 2px solid #EF4444; animation: fadeUp 0.3s ease, pulse-border 2s infinite; }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
    50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }

  .footer { text-align: center; font-size: 11px; color: var(--faint); margin-top: 8px; line-height: 1.5; }
  .footer a { color: var(--pink); text-decoration: none; font-weight: 600; }

  /* Cover slide */
  .cover-badge {
    display: inline-block; background: var(--pink-soft); color: var(--pink);
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    padding: 5px 12px; border-radius: 20px; margin-bottom: 16px;
  }
  .cover-title {
    font-family: 'Spectral', Georgia, serif; font-weight: 600;
    font-size: 30px; line-height: 1.15; letter-spacing: -0.4px;
    color: var(--ink); margin-bottom: 14px;
  }
  .cover-intro { font-size: 14.5px; line-height: 1.6; color: var(--body); margin-bottom: 22px; }
  .cover-example-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--green); margin-bottom: 10px;
  }
  .preview {
    background: linear-gradient(160deg, #FCF5F9 0%, #F5FAF6 100%);
    border: 1.5px solid var(--green-line);
    border-radius: 14px; padding: 18px 18px 16px; margin-bottom: 14px;
  }
  .preview .p-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .preview .p-title { font-size: 16px; font-weight: 800; margin-bottom: 7px; letter-spacing: -0.2px; }
  .preview .p-exp { font-size: 13px; line-height: 1.55; color: var(--body); margin-bottom: 12px; }
  .preview .tips li { font-size: 12.5px; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }
  .chip {
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: #fff; border: 1.5px solid var(--green-line);
    padding: 6px 11px; border-radius: 20px;
  }
  .cover-bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .cover-bullets li { font-size: 13px; line-height: 1.5; color: var(--body); padding-left: 24px; position: relative; }
  .cover-bullets li::before { content: '•'; position: absolute; left: 6px; color: var(--pink); font-weight: 800; font-size: 15px; }
  .btn-start {
    background: var(--green); color: #fff; border: none; border-radius: 12px;
    padding: 16px 18px; width: 100%; font-family: inherit; font-size: 15.5px; font-weight: 800;
    cursor: pointer; transition: background 0.2s; letter-spacing: 0.1px;
  }
  .btn-start:hover { background: var(--green-dark); }
  .cover-note { font-size: 11.5px; color: var(--faint); text-align: center; margin-top: 12px; line-height: 1.5; }

  /* Disclaimer gate */
  .disclaimer-card { border: 2px solid #FCD34D; background: #FFFEF7; }
  .disclaimer-heading { font-size: 21px; font-weight: 800; color: var(--ink); margin-bottom: 18px; letter-spacing: -0.2px; }
  .disclaimer-items { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .disclaimer-items li { font-size: 14px; line-height: 1.55; color: var(--body); padding-left: 24px; position: relative; }
  .disclaimer-items li::before { content: '⚠️'; position: absolute; left: 0; font-size: 12px; top: 1px; }
  .disclaimer-confirm {
    background: #FEF9C3; border: 1px solid #FDE047; border-radius: 8px;
    padding: 13px 15px; font-size: 13px; font-weight: 600; color: #713F12;
    margin-bottom: 20px; line-height: 1.5;
  }
  .btn-agree {
    background: var(--green); color: #fff; border: none; border-radius: 11px;
    padding: 15px 18px; width: 100%; font-family: inherit; font-size: 15px; font-weight: 800;
    cursor: pointer; margin-bottom: 10px; transition: background 0.2s;
  }
  .btn-agree:hover { background: var(--green-dark); }
  .btn-decline {
    background: transparent; color: var(--faint); border: 2px solid #E5E7EB; border-radius: 11px;
    padding: 11px 18px; width: 100%; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-decline:hover { background: #F9FAFB; color: var(--muted); border-color: #D1D5DB; }

  /* Summary section */
  .summary-box { margin-top: 18px; background: var(--green-bg); border: 1.5px solid var(--green-line); border-radius: 12px; padding: 15px 17px; }
  .btn-summary-toggle {
    background: none; border: none; font-family: inherit; font-size: 14px; font-weight: 700;
    color: var(--green-dark); cursor: pointer; padding: 0; text-align: left; width: 100%;
  }
  .btn-summary-toggle:hover { color: var(--green); text-decoration: underline; }
  .summary-hint { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .summary-textarea {
    width: 100%; min-height: 180px; font-size: 12px;
    font-family: 'Courier New', Courier, monospace; line-height: 1.6; color: var(--body);
    background: #fff; border: 1px solid #D1D5DB; border-radius: 8px; padding: 10px 12px;
    resize: vertical; margin-bottom: 10px;
  }
  .summary-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn-sum { flex: 1; min-width: 100px; padding: 10px 12px; border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
  .btn-sum-email { background: var(--green); color: #fff; border: none; }
  .btn-sum-email:hover { background: var(--green-dark); }
  .btn-sum-copy { background: var(--pink-soft); color: var(--pink); border: 1.5px solid #E7C4D5; }
  .btn-sum-copy:hover { background: #F1DCE6; }
  .btn-sum-print { background: #F3F4F6; color: #374151; border: 1.5px solid #D1D5DB; }
  .btn-sum-print:hover { background: #E5E7EB; }

  /* Subscribe + email-summary */
  .sub-form { margin-top: 14px; border-top: 1px solid var(--green-line); padding-top: 13px; }
  .sub-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 9px; }
  .sub-email {
    width: 100%; font-family: inherit; font-size: 14px; padding: 11px 12px;
    border: 1.5px solid var(--green-line); border-radius: 9px; margin-bottom: 8px; color: var(--ink); background: #fff;
  }
  .sub-email:focus { outline: none; border-color: var(--green); }
  .sub-consent { display: flex; gap: 8px; align-items: flex-start; font-size: 11.5px; color: var(--muted); line-height: 1.45; margin-bottom: 10px; cursor: pointer; }
  .sub-consent input { margin-top: 2px; flex: 0 0 auto; accent-color: var(--pink); }
  .btn-sub-email {
    width: 100%; background: var(--pink); color: #fff; border: none; border-radius: 9px;
    padding: 12px 14px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .btn-sub-email:hover { background: #8f2b4e; }
  .sub-status { font-size: 12px; margin-top: 8px; line-height: 1.45; }
  .sub-status.ok { color: var(--green-dark); font-weight: 600; }
  .sub-status.err { color: #b52b2b; font-weight: 600; }

  @media (max-width: 480px) { .cover-title { font-size: 26px; } }

  @media print {
    .header, .progress-bar, .footer, .btn-restart, .btn-continue,
    .summary-btns, .btn-summary-toggle, .sub-form, .nav, .back { display: none !important; }
    .card { box-shadow: none; border: 1px solid #ccc; }
    .summary-textarea { min-height: unset; border: none; padding: 0; font-size: 11px; }
    #summaryPanel { display: block !important; }
  }
</style>
</head>

<div class="wrapper">
  <div class="header">
    <h1 id="hdrTitle"></h1>
    <p id="hdrSub"></p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="content"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ─────────────────────────────────────────────
// TREE = LOGIC ONLY (structure, routing, category, icon, urgency).
// All display text lives in STR[lang][nodeId] further below, so the
// English and Ukrainian versions stay perfectly in sync.
// Node types: 'cover' | 'disclaimer' | 'result' | (default) question
// ─────────────────────────────────────────────
const TREE = {
  cover: { type: 'cover', start: 'disclaimer_gate' },

  disclaimer_gate: { type: 'disclaimer', agreeNext: 'start', declineNext: 'disclaimer_declined' },
  disclaimer_declined: { type: 'result', category: 'medical', icon: '👋', urgency: 'low' },

  start: { options: [{ next: 'which_type' }, { next: 'no_diagnosis' }] },
  no_diagnosis: { type: 'result', category: 'medical', icon: '🏥', urgency: 'high' },

  which_type: { options: [{ next: 'high_or_low' }, { next: 'high_or_low' }, { next: 'high_or_low' }, { next: 'high_or_low' }, { next: 'high_or_low' }] },
  high_or_low: { options: [{ next: 'high_how_high' }, { next: 'low_severity' }] },

  // HIGH branch
  high_how_high: { options: [{ next: 'high_recent_food' }, { next: 'high_recent_food' }, { next: 'high_very_high_warning' }] },
  high_very_high_warning: { type: 'result', category: 'emergency', icon: '🚨', urgency: 'critical', continueNext: 'high_recent_food' },
  high_recent_food: { options: [{ next: 'high_food_carbs' }, { next: 'high_insulin_check' }] },
  high_food_carbs: { options: [{ next: 'result_carb_load' }, { next: 'high_hidden_carbs' }] },
  high_hidden_carbs: { options: [{ next: 'result_hidden_carbs' }, { next: 'high_insulin_check' }] },
  high_insulin_check: { options: [{ next: 'high_missed_dose' }, { next: 'high_pump_check' }, { next: 'high_t2_meds' }] },
  high_missed_dose: { options: [{ next: 'result_missed_dose' }, { next: 'high_dose_correct' }] },
  high_dose_correct: { options: [{ next: 'result_miscalculation' }, { next: 'high_injection_site' }] },
  high_injection_site: { options: [{ next: 'result_injection_site' }, { next: 'high_insulin_freshness' }] },
  high_insulin_freshness: { options: [{ next: 'result_bad_insulin' }, { next: 'high_illness' }] },
  high_pump_check: { options: [{ next: 'result_pump_issue' }, { next: 'high_illness' }] },
  high_t2_meds: { options: [{ next: 'result_missed_meds' }, { next: 'high_illness' }] },
  high_illness: { options: [{ next: 'result_illness' }, { next: 'high_stress' }] },
  high_stress: { options: [{ next: 'result_stress' }, { next: 'high_hormones' }] },
  high_hormones: { options: [{ next: 'result_hormones_high' }, { next: 'high_hormones_menopause' }] },
  high_hormones_menopause: { options: [{ next: 'result_menopause_high' }, { next: 'high_hormones_contraception' }] },
  high_hormones_contraception: { options: [{ next: 'result_contraception_high' }, { next: 'high_growth_hormones' }] },
  high_growth_hormones: { options: [{ next: 'result_growth_hormones' }, { next: 'high_protein_fat' }] },
  high_protein_fat: { options: [{ next: 'result_gluconeogenesis' }, { next: 'high_caffeine' }] },
  high_caffeine: { options: [{ next: 'result_caffeine' }, { next: 'high_sleep' }] },
  high_sleep: { options: [{ next: 'result_sleep' }, { next: 'high_exercise_type' }] },
  high_exercise_type: { options: [{ next: 'result_intense_exercise' }, { next: 'high_cgm_check' }] },
  high_cgm_check: { options: [{ next: 'result_cgm_high' }, { next: 'high_dehydration' }] },
  high_dehydration: { options: [{ next: 'result_dehydration' }, { next: 'high_temperature' }] },
  high_temperature: { options: [{ next: 'result_temperature_high' }, { next: 'high_altitude' }] },
  high_altitude: { options: [{ next: 'result_altitude' }, { next: 'high_blood_pressure' }] },
  high_blood_pressure: { options: [{ next: 'result_blood_pressure_high' }, { next: 'high_dawn' }] },
  high_dawn: { options: [{ next: 'result_dawn' }, { next: 'high_somogyi' }] },
  high_somogyi: { options: [{ next: 'result_somogyi' }, { next: 'result_unknown_high' }] },

  // LOW branch
  low_severity: { options: [{ next: 'low_treat_mild' }, { next: 'low_treat_moderate' }, { next: 'low_emergency' }] },
  low_emergency: { type: 'result', category: 'emergency', icon: '🚨', urgency: 'critical' },
  low_treat_mild: { type: 'result', category: 'illness', icon: '🍬', urgency: 'medium', continueNext: 'low_insulin_check' },
  low_treat_moderate: { type: 'result', category: 'illness', icon: '🍬', urgency: 'high', continueNext: 'low_insulin_check' },
  low_insulin_check: { options: [{ next: 'low_too_much_insulin' }, { next: 'low_too_much_insulin' }, { next: 'low_t2_meds' }] },
  low_too_much_insulin: { options: [{ next: 'result_too_much_insulin' }, { next: 'low_food_timing' }] },
  low_t2_meds: { options: [{ next: 'result_sulfonylurea' }, { next: 'low_food_timing' }] },
  low_food_timing: { options: [{ next: 'result_missed_meal' }, { next: 'low_exercise' }] },
  low_exercise: { options: [{ next: 'low_exercise_type' }, { next: 'low_alcohol' }] },
  low_exercise_type: { options: [{ next: 'result_exercise_low' }, { next: 'result_exercise_delayed_low' }] },
  low_alcohol: { options: [{ next: 'result_alcohol' }, { next: 'low_hormones' }] },
  low_hormones: { options: [{ next: 'result_hormones_low' }, { next: 'low_hormones_menopause' }] },
  low_hormones_menopause: { options: [{ next: 'result_menopause_low' }, { next: 'low_hormones_contraception' }] },
  low_hormones_contraception: { options: [{ next: 'result_contraception_low' }, { next: 'low_gastroparesis' }] },
  low_gastroparesis: { options: [{ next: 'result_gastroparesis' }, { next: 'low_weight_change' }] },
  low_weight_change: { options: [{ next: 'result_weight_change' }, { next: 'low_hot_bath' }] },
  low_hot_bath: { options: [{ next: 'result_heat_absorption' }, { next: 'low_cgm_check' }] },
  low_cgm_check: { options: [{ next: 'result_cgm_false_low' }, { next: 'low_temperature' }] },
  low_temperature: { options: [{ next: 'result_heat_low' }, { next: 'low_blood_pressure' }] },

const U = UI[LANG] || UI.en;
function s(id) { return (STR[LANG] && STR[LANG][id]) || STR.en[id] || {}; }
function catLabel(c) { return (U.cat && U.cat[c]) || (c ? c.charAt(0).toUpperCase() + c.slice(1) : ''); }
function urgLabel(u) { return (U.urgency && U.urgency[u]) || ''; }

// ─────────────────────────────────────────────
// APP ENGINE
// ─────────────────────────────────────────────
let currentId = 'cover';
let trail = []; // [{ id, optIdx }] — the node we came FROM and the option chosen there
const MAX_DEPTH = 20;

function questionsAnswered() { return trail.filter(e => TREE[e.id] && !TREE[e.id].type).length; }

function goTo(id, optIdx) { trail.push({ id: currentId, optIdx: optIdx }); currentId = id; render(); }
function goBack() { if (!trail.length) return; currentId = trail.pop().id; render(); }
function restart() { currentId = 'start'; trail = []; render(); }

function render() {
  const node = TREE[currentId];
  if (!node) { console.error('Missing node:', currentId); return; }
  const fill = document.getElementById('progressFill');
  if (node.type === 'cover' || node.type === 'disclaimer') {
    fill.style.width = '0%';
  } else {
    const pct = Math.min(4 + (questionsAnswered() / MAX_DEPTH) * 95, 99);
    fill.style.width = Math.max(pct, 4) + '%';
  }
  if (node.type === 'cover')            renderCover();
  else if (node.type === 'result')      renderResult(node);
  else if (node.type === 'disclaimer')  renderDisclaimer(node);
  else                                  renderQuestion(node);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  postHeight();
}

function renderCover() {
  const c = s('cover');
  const tips = (c.ex_tips || []).map(t => `<li>${escHtml(t)}</li>`).join('');
  const chips = (c.chips || []).map(ch => `<span class="chip">${escHtml(ch)}</span>`).join('');
  const bullets = (c.bullets || []).map(b => `<li>${escHtml(b)}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="card">
      <span class="cover-badge">${escHtml(c.badge)}</span>
      <div class="cover-title">${escHtml(c.title)}</div>
      <div class="cover-intro">${escHtml(c.intro)}</div>
      <div class="cover-example-label">${escHtml(c.exampleLabel)}</div>
      <div class="preview">
        <span class="urgency-tag u-${c.ex_urgency}">${escHtml(urgLabel(c.ex_urgency))}</span>
        <span class="p-icon">${c.ex_icon || '🌸'}</span>
        <span class="badge b-${c.ex_cat}">${escHtml(catLabel(c.ex_cat))}</span>
        <div class="p-title">${escHtml(c.ex_title)}</div>
        <div class="p-exp">${escHtml(c.ex_exp)}</div>
        ${tips ? `<div class="tips-label">${escHtml(U.whatToDo)}</div><ul class="tips">${tips}</ul>` : ''}
      </div>
      <div class="chips">${chips}</div>
      <ul class="cover-bullets">${bullets}</ul>
      <button class="btn-start" onclick="goTo('${TREE.cover.start}')">${escHtml(c.startBtn)}</button>
      <div class="cover-note">${escHtml(c.note)}</div>
    </div>
  `;
}

function renderDisclaimer(node) {
  const d = s('disclaimer_gate');
  const items = (d.items || []).map(i => `<li>${escHtml(i)}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="card disclaimer-card">
      <div class="disclaimer-heading">⚕️ ${escHtml(d.title)}</div>
      <ul class="disclaimer-items">${items}</ul>
      <div class="disclaimer-confirm">${escHtml(d.confirmation)}</div>
      <button class="btn-agree" onclick="goTo('${node.agreeNext}')">${escHtml(U.agree)}</button>
      <button class="btn-decline" onclick="goTo('${node.declineNext}')">${escHtml(U.decline)}</button>
    </div>
  `;
}

function renderQuestion(node) {
  const txt = s(currentId);
  const stepNum = questionsAnswered() + 1;
  const opts = node.options.map((opt, i) =>
    `<button class="opt" onclick="goTo('${opt.next}', ${i})">${escHtml((txt.opts && txt.opts[i]) || '')}</button>`
  ).join('');
  const backBtn = trail.length > 0 ? `<button class="back" onclick="goBack()">${escHtml(U.back)}</button>` : `<span></span>`;
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="step-label">${escHtml(U.step)} ${stepNum}</div>
      <div class="question">${escHtml(txt.q || '')}</div>
      ${txt.sub ? `<div class="subtitle">${escHtml(txt.sub)}</div>` : ''}
      <div class="options">${opts}</div>
      <div class="nav">${backBtn}<span class="step-count">${escHtml(U.step)} ${stepNum}</span></div>
    </div>
  `;
}

function renderResult(node) {
  const txt = s(currentId);
  const tips = (txt.tips || []).map(t => `<li>${escHtml(t)}</li>`).join('');
  const continueBtn = node.continueNext
    ? `<button class="btn-continue" onclick="goTo('${node.continueNext}')">${escHtml(txt.continueLabel || '')}</button>`
    : '';
  const cardClass = node.urgency === 'critical' ? 'card critical-border' : 'card';
  const titleClass = node.urgency === 'critical' ? 'result-title critical-color' : 'result-title';
  document.getElementById('content').innerHTML = `
    <div class="${cardClass}">
      <span class="result-icon">${node.icon || '🔍'}</span>
      <span class="urgency-tag u-${node.urgency}">${escHtml(urgLabel(node.urgency))}</span>
      <span class="badge b-${node.category}">${escHtml(catLabel(node.category))}</span>
      <div class="${titleClass}">${escHtml(txt.title || '')}</div>
      <div class="explanation">${escHtml(txt.exp || '')}</div>
      ${tips ? `<div class="tips-label">${escHtml(U.whatToDo)}</div><ul class="tips">${tips}</ul>` : ''}
      <div class="consult-note">${escHtml(U.consultNote)}</div>
      ${continueBtn}
      <div class="summary-box">
        <button id="summaryToggleBtn" class="btn-summary-toggle" onclick="toggleSummary()">${escHtml(U.summaryToggle)}</button>
        <div id="summaryPanel" style="display:none; margin-top:12px">
          <p class="summary-hint">${escHtml(U.summaryHint)}</p>
          <textarea id="summaryText" class="summary-textarea" readonly></textarea>
          <div class="summary-btns">
            <button id="copyBtn" class="btn-sum btn-sum-copy" onclick="copySummary()">${escHtml(U.copy)}</button>
            <button class="btn-sum btn-sum-print" onclick="window.print()">${escHtml(U.print)}</button>
          </div>
          <form class="sub-form" onsubmit="subscribeSummary(event)">
            <p class="sub-hint">${escHtml(U.subHint)}</p>
            <input type="email" class="sub-email" placeholder="${escHtml(U.subEmailPlaceholder)}" autocomplete="email" />
            <label class="sub-consent"><input type="checkbox" class="sub-consent-box" /> <span>${escHtml(U.subConsent)}</span></label>
            <button type="submit" class="btn-sub-email">${escHtml(U.subBtn)}</button>
            <div class="sub-status" id="subStatus"></div>
          </form>
        </div>
      </div>
      <button class="btn-restart" onclick="restart()">${escHtml(U.restart)}</button>
    </div>
    ${trail.length > 0 ? `<div style="text-align:center; margin-top:4px"><button class="back" onclick="goBack()">${escHtml(U.goBackStep)}</button></div>` : ''}
  `;
}

// ─────────────────────────────────────────────
// SUMMARY / SHARE
// ─────────────────────────────────────────────
function buildQAPairs() {
  const pairs = [];
  trail.forEach(e => {
    const node = TREE[e.id];
    if (!node || node.type) return;            // only question nodes
    if (e.optIdx === undefined || e.optIdx === null) return;
    const txt = s(e.id);
    if (txt.q && txt.opts && txt.opts[e.optIdx]) pairs.push({ q: txt.q, a: txt.opts[e.optIdx] });
  });
  return pairs;
}

function getSummaryText() {
  const pairs = buildQAPairs();
  const node = TREE[currentId];
  const txt = s(currentId);
  const now = new Date();
  const dateStr = now.toLocaleDateString(U.locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const timeStr = now.toLocaleTimeString(U.locale, { hour: '2-digit', minute: '2-digit' });
  const line = '══════════════════════════════════════════\n';
  const thin = '──────────────────────────────────────────\n';
  let t = U.sumTitle + '\n' + U.sumGenerated + ' ' + dateStr + ' ' + U.sumAt + ' ' + timeStr + '\n' + U.sumTool + '\n' + line + '\n';
  if (pairs.length) {
    t += U.sumAnswers + '\n' + thin;
    pairs.forEach((p, i) => { t += '\nQ' + (i + 1) + ': ' + p.q + '\n   → ' + p.a + '\n'; });
    t += '\n';
  }
  if (node && node.type === 'result') {
    t += line + U.sumCause + '\n' + thin + '\n' + (txt.title || '') + '\n\n' + (txt.exp || '') + '\n\n';
    if (txt.tips && txt.tips.length) {
      t += U.sumDiscussLabel + '\n';
      txt.tips.forEach(tip => { t += '• ' + tip + '\n'; });
      t += '\n';
    }
  }
  t += line + U.sumDisclaimer1 + '\n' + U.sumDisclaimer2 + '\n' + U.sumDisclaimer3 + '\n' + U.sumDisclaimer4 + '\n' + line;
  return t;
}

function toggleSummary() {
  const panel = document.getElementById('summaryPanel');
  const btn = document.getElementById('summaryToggleBtn');
  const ta = document.getElementById('summaryText');
  if (!panel) return;
  const isHidden = panel.style.display === 'none' || panel.style.display === '';
  panel.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? U.summaryHide : U.summaryToggle;
  if (isHidden && ta) ta.value = getSummaryText();
  postHeight();
}

// Newsletter capture — same Google Apps Script endpoint the main site posts to.
const NEWSLETTER_ENDPOINT = "https://script.google.com/macros/s/AKfycbw21p8PuG5jGQ7JXf7j-tX1-OZBeA1p6negAuzi7TmiyPkjEoshxLbtGc6avUVskGiK/exec";
const SUB_GROUPS = "t1d";

function openSummaryMail(to) {
  const subject = encodeURIComponent(U.emailSubject + ' — ' + new Date().toLocaleDateString(U.locale));
  const body = encodeURIComponent(getSummaryText());
  window.location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + subject + '&body=' + body;
}

// Subscribe the visitor to the newsletter, then open a ready-to-send email of their
// summary addressed to themselves. Only the email they type is sent to the endpoint —
// their answers stay on-device and travel only via their own mail client.
function subscribeSummary(e) {
  e.preventDefault();
  const form = e.target;
  const email = ((form.querySelector('.sub-email') || {}).value || '').trim();
  const consent = !!(form.querySelector('.sub-consent-box') || {}).checked;
  const status = form.querySelector('.sub-status');
  const setStatus = (msg, cls) => { if (status) { status.textContent = msg; status.className = 'sub-status' + (cls ? ' ' + cls : ''); } postHeight(); };
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { setStatus(U.subErrEmail, 'err'); return; }
  if (!consent) { setStatus(U.subErrConsent, 'err'); return; }
  setStatus(U.subBusy, '');
  const rec = { email: email, lang: LANG, source: 'blood-sugar-investigator', groups: SUB_GROUPS, consent: 'yes', at: new Date().toISOString() };
  try {
    const body = Object.keys(rec).map(k => k + '=' + encodeURIComponent(rec[k])).join('&');
    fetch(NEWSLETTER_ENDPOINT, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' }, body: body });
  } catch (err) {}
  setStatus(U.subDone, 'ok');
  openSummaryMail(email);   // synchronous — stays within the user gesture
}

function copySummary() {
  const text = getSummaryText();
  const btn = document.getElementById('copyBtn');
  const reset = () => { if (btn) btn.textContent = U.copy; };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => { if (btn) btn.textContent = U.copied; setTimeout(reset, 2500); }).catch(() => fallbackCopy(text, btn, reset));
  } else { fallbackCopy(text, btn, reset); }
}

function fallbackCopy(text, btn, reset) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); if (btn) btn.textContent = U.copied; }
  catch (e) { if (btn) btn.textContent = U.copyFail; }
  document.body.removeChild(ta); setTimeout(reset, 2500);
}

function escHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
// Auto-height for the parent iframe (matches carb-gi / cgm pattern)
// ─────────────────────────────────────────────
function postHeight() {
  try { parent.postMessage({ type: 'bsi-height', height: document.documentElement.scrollHeight }, '*'); } catch (e) {}
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
document.documentElement.lang = (LANG === 'ua') ? 'uk' : 'en';
document.getElementById('hdrTitle').textContent = U.hdrTitle;
document.getElementById('hdrSub').textContent = U.hdrSub;
document.getElementById('footer').innerHTML = escHtml(U.footer);
render();
</script>
